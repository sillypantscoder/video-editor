<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="custom_buttons.css">
		<style>
html {
	height: 100%;
	background: #111;
	color: white;
	font-family: sans-serif;
}
body {
	height: 100%;
	margin: 0;
	display: flex;
}
#timeline {
	width: 25%;
	position: relative;
	user-select: none;
	overflow-y: scroll;
	--height-per-second: 50px;
	& > .timeline-tick {
		font-size: 0.75em;
		/* positioning */
		position: absolute;
		top: calc(50vh + (var(--y) * var(--height-per-second)) - 0.5em);
		left: 0.125em;
		width: calc(100% - 0.125em);
		/* display */
		color: #888;
		&.current-pos {
			color: white;
			z-index: 1;
		}
		pointer-events: none;
		/* line */
		display: flex;
		align-items: center;
		&::after {
			content: "";
			display: block;
			width: 100%;
			border-bottom: 1px solid #333;
			margin-left: 0.5em;
		}
		&.current-pos::after {
			border-bottom-color: white;
		}
	}
	& > .timeline-block {
		position: absolute;
		top: calc(50vh + (var(--startY) * var(--height-per-second)));
		left: calc((var(--x) * 3em) + 2em);
		box-sizing: border-box;
		width: 3em;
		height: calc((var(--endY) - var(--startY)) * var(--height-per-second));
		border: 3px solid var(--color);
		border-radius: 0.5em;
		background-color: color-mix(in srgb, var(--color) 20%, black 80%);
		/* image styles */
		line-height: 0;
		overflow-y: hidden;
		& > img {
			width: 100%;
			margin: 0.25em 0;
			pointer-events: none;
		}
		/* selected styles */
		&.selected {
			outline: 2px solid blue;
			box-shadow: 0px 5px 10px 2.5px blue;
		}
	}
	& > .handle {
		/* Timeline handle styling */
		top: calc(50vh + (var(--y) * var(--height-per-second)) - 0.75em);
		left: calc((var(--x) * 3em) + 2.75em);
	}
}
.handle {
	position: absolute;
	box-sizing: border-box;
	width: 1.5em;
	height: 1.5em;
	border: 3px solid #08F;
	background-color: white;
	border-radius: 50%;
	&:hover {
		background-color: #8CF;
	}
	&.active {
		background-color: #08F;
	}
}
#main-panel {
	width: 75%;
	display: flex;
	flex-direction: column;
}
#preview-container {
	height: 50%;
	user-select: none;
	display: flex;
	position: relative;
	justify-content: center;
	align-items: center;
	background: #222;
	& > canvas {
		background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2 2"><rect x="0" y="0" width="2" height="2" fill="rgb(0,0,0)" /><rect x="1" y="0" width="1" height="1" fill="rgb(32,32,32)" /><rect x="0" y="1" width="1" height="1" fill="rgb(32,32,32)" /></svg>');
		background-size: 10px;
		box-shadow: 0px 8px 20px 2px black;
	}
	& > .handle {
		/* Viewport handle styling */
		top: calc(50% + var(--y) - 0.75em);
		left: calc(50% + var(--x) - 0.75em);
	}
}
#tab-container {
	height: 50%;
}
h3 {
	margin: 0.25em 0;
}
.tree-node {
	position: relative;
	margin-top: 0.25em;
	& .tree-node {
		margin-left: 1.5em;
		&::before {
			content: "";
			display: block;
			position: absolute;
			top: 0.5em;
			left: -1.25em;
			width: 1em;
			height: 0;
			border-bottom: 1px solid gray;
		}
		&:has( > :is(button, input))::before {
			top: 0.875em;
		}
	}
	&:has( > .tree-node) {
		&::after {
			content: "";
			display: block;
			position: absolute;
			top: 1em;
			left: 0.25em;
			width: 0;
			height: calc(100% - 2.25em);
			border-right: 1px solid gray;
		}
		&:has( > :is(button, input))::after {
			top: 1.5em;
			height: calc(100% - 2.75em);
		}
	}
	& button {
		font-size: 0.75em;
		margin-left: 1em;
		margin-right: 1em;
	}
}
input[type="number"], input[type="text"] {
	font-size: 1em;
	margin: 0.25em;
	border: none;
	border-radius: 0.125em;
	padding: 0.25em;
	background: black;
	color: white;
	outline: 1px solid white;
	&:focus {
		outline-width: 0.25em;
	}
	&[type="text"] {
		width: 40em;
	}
}
		</style>
	</head>
	<body>
		<div id="timeline"
			onscroll="app.onScroll()"
			onwheel="if (event.ctrlKey) { event.preventDefault(); app.zoomTimeline(Math.pow(2, event.deltaY / -300)) }"
			onmousedown="if (event.clientX > this.clientWidth) { /* clicked on scrollbar */ } else if (event.target.classList.contains('handle')) { app.startDraggingHandleFromElement(event.target, event.clientX, event.clientY); } else if (event.target.classList.contains('timeline-block')) { if (app.selection != null && event.target == app.timelineElements.get(app.selection.object)) { app.startDraggingInvisibleTimelineHandleForObject(app.selection.object, event.clientY) } else { app.selectObjectFromTimelineBlock(event.target) } } else { app.setCurrentTime(app.getRoundedTimelinePosition(event.clientY)) }"
			onmousemove="if (app.selection?.draggingHandle != null) { app.moveDraggingHandle(0, event.clientY); }"
			onmouseup="if (app.selection?.draggingHandle != null) { app.stopDraggingHandle(); }"
		></div>
		<div id="main-panel">
			<div id="preview-container"
				onmousedown="if (event.target.classList.contains('handle')) { app.startDraggingHandleFromElement(event.target, event.clientX, event.clientY); } else if (event.target == event.currentTarget && app.selection != null) { app.setSelectedObject(null) }"
				onmousemove="if (app.selection?.draggingHandle != null) { app.moveDraggingHandle(event.clientX, event.clientY); }"
				onmouseup="if (app.selection?.draggingHandle != null) { app.stopDraggingHandle(); }"
			></div>
			<div id="tab-container"></div>
		</div>
		<script src="jszip.min.js"></script>
		<script src="index.js"></script>
	</body>
</html>
